name: Bump patch version

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude-plugin/plugin.json'
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in plugin.json
        run: |
          FILE=".claude-plugin/plugin.json"
          CURRENT=$(jq -r '.version' "$FILE")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          jq --arg v "$NEW_VERSION" '.version = $v' "$FILE" > tmp.json && mv tmp.json "$FILE"
          echo "Bumped $CURRENT -> $NEW_VERSION"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to $(jq -r '.version' .claude-plugin/plugin.json)"
          git push
