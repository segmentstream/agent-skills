name: Bump patch version

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude-plugin/plugin.json'
      - '.cursor-plugin/plugin.json'
      - 'package.json'
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_BUMP_TOKEN }}

      - name: Bump patch version across all manifests
        run: |
          FILE=".claude-plugin/plugin.json"
          CURRENT=$(jq -r '.version' "$FILE")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          for f in .claude-plugin/plugin.json .cursor-plugin/plugin.json package.json; do
            jq --arg v "$NEW_VERSION" '.version = $v' "$f" > tmp.json && mv tmp.json "$f"
          done

          echo "Bumped $CURRENT -> $NEW_VERSION in all manifests"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .cursor-plugin/plugin.json package.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to $(jq -r '.version' .claude-plugin/plugin.json)"
          git push
